<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio CMS | Md. Nur Nabi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="admin-login is-hidden" id="admin-login">
    <form class="admin-login__card" id="admin-login-form" novalidate>
      <h1>Admin Login</h1>
      <p>Enter password to access the CMS.</p>
      <label for="admin-password">Password</label>
      <input id="admin-password" name="password" type="password" autocomplete="current-password" required placeholder="Password" />
      <button type="submit" class="btn btn--primary">Login</button>
      <p class="admin-login__hint">Password: 1234</p>
      <p class="admin-login__error" id="admin-login-error" aria-live="polite"></p>
      <a class="admin-login__back" href="index.html">Back to site</a>
    </form>
  </div>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <h1>Portfolio CMS</h1>
        <p>Md. Nur Nabi</p>
      </div>

      <nav class="admin-nav" aria-label="Admin sections">
        <button class="admin-nav__item is-active" data-target="general">General</button>
        <button class="admin-nav__item" data-target="hero">Hero</button>
        <button class="admin-nav__item" data-target="about">About</button>
        <button class="admin-nav__item" data-target="education">Education</button>
        <button class="admin-nav__item" data-target="publications">Publications</button>
        <button class="admin-nav__item" data-target="memberships">Memberships</button>
        <button class="admin-nav__item" data-target="achievements">Achievements</button>
        <button class="admin-nav__item" data-target="leadership">Leadership & Interests</button>
        <button class="admin-nav__item" data-target="contact">Contact</button>
        <button class="admin-nav__item" data-target="settings">Settings</button>
      </nav>

      <a class="admin-back" href="index.html">← Back to Site</a>
    </aside>

    <main class="admin-main">
      <header class="admin-main__header">
        <h2 id="panel-title">General</h2>
        <p>Manage your live academic portfolio content with section-wise controls.</p>
      </header>

      <section class="admin-panel is-active" data-panel="general"></section>
      <section class="admin-panel" data-panel="hero"></section>
      <section class="admin-panel" data-panel="about"></section>
      <section class="admin-panel" data-panel="education"></section>
      <section class="admin-panel" data-panel="publications"></section>
      <section class="admin-panel" data-panel="memberships"></section>
      <section class="admin-panel" data-panel="achievements"></section>
      <section class="admin-panel" data-panel="leadership"></section>
      <section class="admin-panel" data-panel="contact"></section>
      <section class="admin-panel" data-panel="settings"></section>

      <div class="status-toast" id="status-toast" role="status" aria-live="polite"></div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="admin.js"></script>
</body>
</html>
